<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Agency CRM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #23273a;
      --border: #2e3347;
      --accent: #4f7df4;
      --accent-hover: #3a6be0;
      --danger: #e05252;
      --danger-hover: #c93c3c;
      --text: #e4e6f0;
      --text-muted: #7a7f9a;
      --success: #3ecf8e;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: 2px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #lead-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── Main Layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 0;
    }

    /* ── Section titles ── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Add Lead Form ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
    }

    input::placeholder, textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .form-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 9px 20px;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Search Bar ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #search {
      padding-left: 36px;
    }

    .results-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Leads Table ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      padding: 12px 16px;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 13px 16px;
      font-size: 0.88rem;
      vertical-align: top;
    }

    td.name-cell {
      font-weight: 600;
    }

    td.notes-cell {
      color: var(--text-muted);
      max-width: 280px;
    }

    .notes-text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .location-badge {
      display: inline-block;
      background: rgba(79,125,244,0.15);
      color: #6e9bfa;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    .date-text {
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 5px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: rgba(224,82,82,0.1);
    }

    /* ── Empty State ── */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--success);
      color: #0a2a1c;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 30px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 200;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      main { padding: 20px 12px 0; }
      th.hide-sm, td.hide-sm { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📋</div>
  <div>
    <h1>Marketing CRM <span>by Agency</span></h1>
  </div>
  <div class="header-right">
    <div id="lead-count">0 leads</div>
  </div>
</header>

<main>

  <!-- Add Lead Form -->
  <div class="section-title">Add New Lead</div>
  <div class="form-card">
    <form id="lead-form" autocomplete="off">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Lead Name *</label>
          <input type="text" id="name" placeholder="Jane Smith" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
        </div>
        <div class="form-group">
          <label for="date">Date Called</label>
          <input type="date" id="date" />
        </div>
        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" placeholder="New York, NY" />
        </div>
        <div class="form-group full">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Brief notes about this lead..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">+ Add Lead</button>
        <button type="button" class="btn btn-ghost" id="clear-btn">Clear</button>
      </div>
    </form>
  </div>

  <!-- Leads List -->
  <div class="toolbar">
    <div class="section-title" style="margin-bottom:0">All Leads</div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search by name or location..." />
    </div>
    <span class="results-label" id="results-label"></span>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th class="hide-sm">Phone</th>
          <th class="hide-sm">Date Called</th>
          <th>Location</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leads-body">
      </tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">
      <div class="icon">🔍</div>
      <strong>No leads found</strong>
      <p>Try a different search term, or add a new lead above.</p>
    </div>
  </div>

</main>

<div id="toast">Lead added!</div>

<script>
  const STORAGE_KEY = 'crm_leads_v1';

  // ── State ──────────────────────────────────────────────
  let leads = [];
  let searchQuery = '';

  // ── Storage ────────────────────────────────────────────
  function saveLeads() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  }

  function loadLeads() {
    try {
      leads = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      leads = [];
    }
  }

  // ── Render ─────────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
  }

  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function filteredLeads() {
    if (!searchQuery) return leads;
    const q = searchQuery.toLowerCase();
    return leads.filter(l =>
      l.name.toLowerCase().includes(q) ||
      (l.location || '').toLowerCase().includes(q)
    );
  }

  function render() {
    const body = document.getElementById('leads-body');
    const empty = document.getElementById('empty-state');
    const countEl = document.getElementById('lead-count');
    const resultsLabel = document.getElementById('results-label');

    const filtered = filteredLeads();

    countEl.textContent = `${leads.length} lead${leads.length !== 1 ? 's' : ''}`;

    if (searchQuery) {
      resultsLabel.textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
    } else {
      resultsLabel.textContent = '';
    }

    if (filtered.length === 0) {
      body.innerHTML = '';
      empty.style.display = '';
      return;
    }

    empty.style.display = 'none';

    // Newest first
    const sorted = [...filtered].reverse();

    body.innerHTML = sorted.map(lead => `
      <tr>
        <td class="name-cell">${escHtml(lead.name)}</td>
        <td class="hide-sm">${escHtml(lead.phone || '—')}</td>
        <td class="date-text hide-sm">${formatDate(lead.date)}</td>
        <td>${lead.location ? `<span class="location-badge">${escHtml(lead.location)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td class="notes-cell"><div class="notes-text">${escHtml(lead.notes || '—')}</div></td>
        <td>
          <button class="delete-btn" data-id="${lead.id}" title="Delete lead" aria-label="Delete ${escHtml(lead.name)}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  // ── Form Submit ─────────────────────────────────────────
  document.getElementById('lead-form').addEventListener('submit', e => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    if (!name) return;

    const lead = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      name,
      phone: document.getElementById('phone').value.trim(),
      date: document.getElementById('date').value,
      location: document.getElementById('location').value.trim(),
      notes: document.getElementById('notes').value.trim(),
      createdAt: Date.now(),
    };

    leads.push(lead);
    saveLeads();
    render();
    e.target.reset();
    document.getElementById('date').valueAsDate = new Date();
    showToast('Lead added!');
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('lead-form').reset();
    document.getElementById('date').valueAsDate = new Date();
  });

  // ── Delete ─────────────────────────────────────────────
  document.getElementById('leads-body').addEventListener('click', e => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    if (confirm('Delete this lead?')) {
      leads = leads.filter(l => l.id !== id);
      saveLeads();
      render();
    }
  });

  // ── Search ─────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  // ── Toast ──────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ── Init ───────────────────────────────────────────────
  loadLeads();
  document.getElementById('date').valueAsDate = new Date();
  render();
</script>
</body>
</html>
